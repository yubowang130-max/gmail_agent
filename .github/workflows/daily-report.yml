name: Daily Gmail Report

on:
  schedule:
    - cron: '0 4 * * *' # 12:00 Asia/Shanghai
  workflow_dispatch:

jobs:
  run-daily-report:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build runtime files from secrets
        run: |
          cat > .env << 'EOF'
          ${{ secrets.ENV_FILE }}
          EOF

          # Force Linux runner paths to avoid Windows absolute paths from ENV_FILE.
          {
            echo ""
            echo "GMAIL_CLIENT_SECRET_PATH=./client_secret.json"
            echo "GMAIL_TOKEN_PATH=./gmail_token.json"
          } >> .env

          cat > client_secret.json << 'EOF'
          ${{ secrets.GMAIL_CLIENT_SECRET_JSON }}
          EOF

          cat > gmail_token.json << 'EOF'
          ${{ secrets.GMAIL_TOKEN_JSON }}
          EOF

          sed -i 's/\r$//' .env client_secret.json gmail_token.json

      - name: Run report
        run: python src/main.py
